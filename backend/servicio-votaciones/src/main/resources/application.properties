spring.application.name=servicio-votaciones
server.port=${PORT:8082}

# Railway inyecta PGHOST/PGPORT/PGUSER/PGPASSWORD/PGDATABASE automaticamente al anadir el plugin PostgreSQL
# Localmente usa los valores por defecto (localhost, postgres/postgres, foro_votaciones)
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:foro_votaciones}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# URL del servicio-publicaciones: en Railway se define la variable PUBLICACIONES_URL
servicios.publicaciones.url=${PUBLICACIONES_URL:http://localhost:8081}
