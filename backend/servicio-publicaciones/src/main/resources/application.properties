spring.application.name=servicio-publicaciones
server.port=${PORT:8081}

# Railway inyecta PGHOST/PGPORT/PGUSER/PGPASSWORD/PGDATABASE automaticamente al anadir el plugin PostgreSQL
# Localmente usa los valores por defecto (localhost, postgres/postgres, foro_publicaciones)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/foro_publicaciones}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
