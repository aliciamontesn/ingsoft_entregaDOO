spring.application.name=servicio-publicaciones
server.port=${PORT:8081}

# Railway inyecta PGHOST/PGPORT/PGUSER/PGPASSWORD/PGDATABASE automaticamente al anadir el plugin PostgreSQL
# Localmente usa los valores por defecto (localhost, postgres/postgres, foro_publicaciones)
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:foro_publicaciones}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
